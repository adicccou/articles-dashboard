name: Deploy oilor.app

on:
  push:
    branches:
      - main
      - codex/**
  workflow_dispatch:

concurrency:
  group: deploy-oilor-app
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy marketing dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build marketing dashboard
        run: npm run build:marketing

      - name: Check Cloudflare deploy token
        id: cloudflare-token
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping oilor.app deploy because CLOUDFLARE_API_TOKEN is not configured for this repository."
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.cloudflare-token.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 45ea71ff9c25ebe55521834446c581a1
          command: deploy --config wrangler.marketing.jsonc
